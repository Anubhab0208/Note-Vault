<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Panel — Notes Sharing Platform</title>

  <!-- Tailwind CDN for quick prototyping -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Optional custom styles -->
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <a href="../index.html" class="w-10 h-10 bg-blue-600 rounded flex items-center justify-center text-white font-bold">NS</a>
        <div>
          <h1 class="text-lg font-semibold">Admin Panel</h1>
          <p class="text-sm text-gray-500">Manage notes and review complaints</p>
        </div>
      </div>

      <nav class="flex items-center space-x-4">
        <a href="../index.html" class="text-sm text-blue-600 hover:underline">Home</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 max-w-6xl mx-auto px-4 py-8 w-full">
    <!-- Login area -->
    <div id="login-area" class="bg-white p-6 rounded shadow max-w-md mx-auto">
      <h2 class="text-lg font-semibold mb-3">Admin Login</h2>

      <div class="space-y-3">
        <input id="admin-username" placeholder="Username" class="w-full border rounded px-3 py-2" />
        <input id="admin-password" type="password" placeholder="Password" class="w-full border rounded px-3 py-2" />
        <div class="flex justify-end">
          <button id="admin-login-btn" class="bg-green-600 text-white px-4 py-2 rounded">Login</button>
        </div>
        <p class="text-xs text-gray-500">Demo credentials: <strong>Admin</strong> / <strong>Admin1010</strong></p>
      </div>
    </div>

    <!-- Admin controls (hidden until login) -->
    <div id="admin-controls" class="hidden mt-6">
      <div class="bg-white p-6 rounded shadow">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-semibold">Notes Management</h3>
          <div>
            <button id="admin-logout" class="text-sm text-red-600">Logout</button>
          </div>
        </div>

        <div id="admin-notes-list" class="space-y-3 mb-6">
          <!-- Notes list rendered by ../assets/js/admin.js -->
        </div>

        <h4 class="font-semibold mb-2">Complaints</h4>
        <div id="complaints-list" class="space-y-3">
          <!-- Complaints rendered by ../assets/js/admin.js -->
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t mt-auto">
    <div class="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row md:items-center md:justify-between">
      <div class="text-sm text-gray-600">
        <strong>Notes Sharing Platform</strong> — admin panel (client-side demo).
      </div>

      <div class="mt-3 md:mt-0 flex items-center space-x-4 text-sm">
        <a href="../index.html" class="text-blue-600 hover:underline">Home</a>
        <a href="#" class="text-gray-600">Privacy</a>
        <span class="text-gray-400">|</span>
        <span class="text-gray-500">© <span id="year"></span> Notes Sharing</span>
      </div>
    </div>
  </footer>

  <script>
    // Footer year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <!-- Admin logic -->
  <script src="../assets/js/admin.js"></script>
</body>
</html>
