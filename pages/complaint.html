<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complaint Form</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #0f1115;
    font-family: 'Inter', sans-serif;
    color: #e5e5e5;
  }

  .card {
    background-color: #161a22;
    border: none;
    border-radius: 14px;
  }

  .card-header h5 {
    color: #eaf0ff;   /* more visible heading */
    font-weight: 500;
  }

  .form-control {
    background-color: #0f1115;
    border: 1px solid #2a2f3a;
    color: #e5e5e5;
  }

  .form-control:focus {
    background-color: #0f1115;
    color: #ffffff;
    border-color: #6ea8fe;
    box-shadow: none;
  }

  .btn-dark {
    background-color: #6ea8fe;
    border: none;
    color: #0f1115;
    font-weight: 500;
  }

  .btn-dark:hover {
    background-color: #5c9cff;
  }

  label {
    font-size: 0.9rem;
    color: #c3c7d6;
  }

  .view-link {
    color: #8da2fb;
    font-weight: 500;
  }

  .view-link:hover {
    color: #aab6ff;
  }
</style>
</head>

<body>

<div class="container mt-5" style="max-width: 520px;">
  <div class="card shadow-lg">
    
    <div class="card-header bg-transparent border-0 pt-4 px-4">
      <h5 class="mb-0">Submit Complaint</h5>
    </div>

    <div class="card-body px-4 pb-4">
      <form id="complaintForm">

        <div class="mb-3">
          <label>Name</label>
          <input type="text" class="form-control" id="name" required>
        </div>

        <div class="mb-3">
          <label>Subject Code</label>
          <input type="text" class="form-control" id="subjectCode" required>
        </div>

        <div class="mb-3">
          <label>Subject Name</label>
          <input type="text" class="form-control" id="subjectName" required>
        </div>

        <div class="mb-4">
          <label>Reason for Delete</label>
          <textarea class="form-control" id="reason" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-dark w-100">
          Submit Complaint
        </button>

        <a href="complaint-list.html" class="d-block text-center mt-3 text-decoration-none" style="color:#8da2fb;">
          View Complaint List
        </a>

      </form>
    </div>
  </div>
</div>

<script>
  document.getElementById("complaintForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    let complaint = {
      name: document.getElementById("name").value,
      subjectCode: document.getElementById("subjectCode").value,
      subjectName: document.getElementById("subjectName").value,
      reason: document.getElementById("reason").value
    };

    complaints.push(complaint);
    localStorage.setItem("complaints", JSON.stringify(complaints));

    alert("Complaint Submitted Successfully!");
    this.reset();
  });
</script>

</body>
</html>
